<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="activityLogs">Activity Logs</title>
    <link rel="stylesheet" href="../inner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="logsBody">
    <a href="/FrontendPage/inner.html" style="text-decoration: none; color: #e2e8f0;">
        <div class="returnButton">
            <i class="fa-solid fa-arrow-left"></i>
            <label class="returnButtonText" style="cursor: pointer;" data-i18n="back">Back</label>
        </div>
    </a>
    <div class="main">

        <div class="header">
            <h1 data-i18n="activityLogs">Activity Logs</h1>
        </div>
        <input type="text" class="search-box" id="logSearch" placeholder="Search logs..." data-i18n-placeholder="searchLogs">
        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Target</th>
                    </tr>
                </thead>

                <tbody id="logsTable">

                </tbody>

            </table>

        </div>

    </div>
    <script src="../settings.js"></script>
</body>

</html>
