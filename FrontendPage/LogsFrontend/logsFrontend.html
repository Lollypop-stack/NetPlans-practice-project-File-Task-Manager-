<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="activityLogs">Activity Logs</title>
    <link rel="stylesheet" href="../inner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="logsBody">
    <a href="/FrontendPage/inner.html" style="text-decoration: none; color: #e2e8f0;">
        <div class="returnButton">
            <i class="fa-solid fa-arrow-left"></i>
            <label class="returnButtonText" style="cursor: pointer;" data-i18n="back">Back</label>
        </div>
    </a>
    <div class="main">

        <div class="header">
            <button class="menu-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="header-left">
                <h1 data-i18n="activityLogs">Activity Logs</h1>
                <div class="filtersPanel">
                    <button class="filter-btn" type="button" id="filter-btn" aria-label="Open filters">Open Filters</button>
                    <div class="filters-menu hidden" id="filtersMenu">
                        <label for="FilterBox" data-i18n="sortBy:">Sort by:</label>
                        <select id="FilterBox">
                            <option value="az" data-i18n="az" class="filter-option">A-Z</option>
                            <option value="za" data-i18n="za" class="filter-option">Z-A</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="account-card">
                    <div class="account-avatar" aria-hidden="true"><i class="fa-solid fa-circle-user"></i></div>
                    <div class="account-copy"><span class="account-label">Account</span><strong
                            class="user current-user-label">Admin</strong></div>
                    <button type="button" class="account-toggle" aria-expanded="false" aria-label="Open account menu"><i
                            class="fa-solid fa-chevron-down"></i></button>
                    <div class="account-menu" hidden>
                        <button type="button" class="account-menu-btn switch-account-btn">Switch account</button>
                        <button type="button" class="account-menu-btn register-account-btn">Register account</button>
                        <button type="button" class="account-menu-btn danger logout-btn">Log out</button>
                    </div>
                </div>
            </div>
        </div>
        <nav class="mobile-nav" aria-label="Mobile navigation">
            <div class="mobile-nav-top">
                <span class="mobile-nav-label">Menu</span>
                <button type="button" class="mobile-nav-close" aria-label="Close navigation menu">×</button>
            </div>
            <a href="../inner.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
            <a href="../FilesFrontend/filesFrontend.html"><i class="fa-solid fa-file"></i><span>Files</span></a>
            <a href="../TasksFrontend/tasksFrontend.html"><i class="fa-solid fa-list-check"></i><span>Tasks</span></a>
            <a href="logsFrontend.html"><i class="fa-solid fa-clock-rotate-left"></i><span>Logs</span></a>
            <a href="../SettingsFrontend/settingsFrontend.html"><i
                    class="fa-solid fa-gear"></i><span>Settings</span></a>
        </nav>
        <div class="mobile-nav-overlay"></div>
        <input type="text" class="logSearch" id="logSearch" placeholder="Search logs..."
            data-i18n-placeholder="searchLogs">
        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Target</th>
                    </tr>
                </thead>

                <tbody id="logsTable">

                </tbody>

            </table>

        </div>

    </div>
    <script src="../SettingsFrontend/settings.js"></script>
    <script src="../layout.js"></script>
    <script src="logsFrontend.js"></script>
</body>

</html>
