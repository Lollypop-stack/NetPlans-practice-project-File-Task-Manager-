<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link rel="stylesheet" href="../inner.css">
</head>

<body>
    <div class="main">

        <div class="header">
            <h1>Tasks</h1>
            <button id="createTaskBtn">Create Task</button>
        </div>
        <input type="text" class="search-box" id="taskSearch" placeholder="Search tasks...">
        <div class="table-container">


            <table>

                <thead>
                    <tr>
                        <th>Title</th>
                        <th>File</th>
                        <th>Assigned User</th>
                        <th>Status</th>
                        <th>Deadline</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tasksTable">

                </tbody>

            </table>

        </div>

    </div>
</body>

</html>
