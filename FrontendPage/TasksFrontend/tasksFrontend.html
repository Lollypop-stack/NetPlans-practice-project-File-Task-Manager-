<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="tasksTitle">Tasks</title>
    <link rel="stylesheet" href="../inner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="tasksBody">
    <a href="/FrontendPage/inner.html" style="text-decoration: none; color: #e2e8f0;">
        <div class="returnButton">
            <i class="fa-solid fa-arrow-left"></i>
            <label class="returnButtonText" style="cursor: pointer;" data-i18n="back">Back</label>
        </div>
    </a>
    <div class="main">

        <div class="header">
            <h1 data-i18n="tasksTitle">Tasks</h1>
            <button id="createTaskBtn" data-i18n="createTask">Create Task</button>
        </div>
        <input type="text" class="search-box" id="taskSearch" placeholder="Search tasks..." data-i18n-placeholder="searchTasks">
        <div class="table-container">


            <table>

                <thead>
                    <tr>
                        <th>Title</th>
                        <th>File</th>
                        <th>Assigned User</th>
                        <th>Status</th>
                        <th>Deadline</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tasksTable">

                </tbody>

            </table>

        </div>

    </div>
    <script src="../settings.js"></script>
</body>

</html>
