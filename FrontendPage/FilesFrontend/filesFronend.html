<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files</title>
    <link rel="stylesheet" href="../inner.css">
</head>

<body>
    <div class="main">

        <div class="header">
            <h1>Files</h1>
            <button id="uploadFileBtn">Upload File</button>
        </div>
        <input type="text" class="search-box" id="fileSearch" placeholder="Search files...">
        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>Version</th>
                        <th>Last Modified</th>
                        <th>Modified By</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="filesTable">

                </tbody>

            </table>

        </div>

    </div>
</body>

</html>
