<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="appTitle">File Task Manager</title>
    <link rel="stylesheet" href="inner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="sidebar">

        <div class="logo" data-i18n="appTitle">Task Manager</div>

        <a href="#">
            <i class="fa-solid fa-house"></i>
            <span data-i18n="dashboard">Dashboard</span>
        </a>

        <a href="FilesFrontend/filesFronend.html">
            <i class="fa-solid fa-file"></i>
            <span data-i18n="files">Files</span>
        </a>

        <a href="TasksFrontend/tasksFrontend.html">
            <i class="fa-solid fa-list-check"></i>
            <span data-i18n="tasks">Tasks</span>
        </a>

        <a href="LogsFrontend/logsFrontend.html">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span data-i18n="logs">Logs</span>
        </a>

        <a href="settingsFrontend/settingsFrontend.html">
            <i class="fa-solid fa-gear"></i>
            <span data-i18n="settings">Settings</span>
        </a>

    </div>

    <div class="main">

        <div class="header">
            <h1 data-i18n="appTitle">File Task Manager</h1>
            <div class="user" id="currentUser">Admin</div>
        </div>

        <div class="stats">

            <div class="card">
                <h3 data-i18n="totalFiles">Total Files</h3>
                <div class="number" id="totalFiles">0</div>
            </div>

            <div class="card">
                <h3 data-i18n="activeTasks">Active Tasks</h3>
                <div class="number" id="activeTasks">0</div>
            </div>

            <div class="card">
                <h3 data-i18n="completedTasks">Completed Tasks</h3>
                <div class="number" id="completedTasks">0</div>
            </div>

            <div class="card">
                <h3 data-i18n="users">Users</h3>
                <div class="number" id="totalUsers">0</div>
            </div>

        </div>

        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th data-i18n="file">File</th>
                        <th data-i18n="assignedUser">Assigned User</th>
                        <th data-i18n="status">Status</th>
                        <th data-i18n="lastModified">Last Modified</th>
                        <th data-i18n="action">Action</th>
                    </tr>
                </thead>

                <tbody id="taskTable">

                    <!-- Заполняется через C# -->

                </tbody>

            </table>

        </div>
        <div id="taskDetails">
            <h2 data-i18n="taskDetails">Task Details</h2>

            <p><strong data-i18n="fileLabel">File:</strong> <span id="detailFile"></span></p>

            <p><strong data-i18n="userLabel">User:</strong> <span id="detailUser"></span></p>

            <p><strong data-i18n="status">Status:</strong> <span id="detailStatus"></span></p>

            <p><strong data-i18n="lastModified">Last Modified:</strong> <span id="detailModified"></span></p>

            <p><strong data-i18n="descriptionLabel">Description:</strong></p>
            <div id="detailDescription"></div>
        </div>

    </div>
<script src="settings.js"></script>
</body>

</html>
