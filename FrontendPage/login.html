<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="signIn">File Task Manager — Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="inner.css">
</head>
<body class="login-page">

<div class="card">

    <div class="logo">
        <div class="logo-icon"><i class="fa-solid fa-code-branch"></i></div>
        <div class="logo-text" data-i18n="appTitle">File Task Manager</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')" data-i18n="signIn">Sign In</button>
        <button class="tab" onclick="switchTab('register')" data-i18n="register">Register</button>
    </div>

    <!-- ── LOGIN ── -->
    <div class="form-panel active" id="panel-login">
        <div class="form-title" data-i18n="welcomeBack">Welcome back!</div>
        <div class="form-sub" data-i18n="credentialsPrompt">Enter your credentials to continue:</div>

        <div class="alert" id="login-alert">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="login-alert-msg"></span>
        </div>

        <div class="field">
            <label data-i18n="username">Username</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="login-user" placeholder="username" autocomplete="off" data-i18n-placeholder="placeholderUsername">
            </div>
        </div>

        <div class="field">
            <label data-i18n="password">Password</label>
            <div class="input-wrap">
                <i class="fa fa-lock" aria-hidden="true"></i>
                <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" data-i18n-placeholder="placeholderPassword">
                <button class="toggle-pw" onclick="togglePw('login-pass', this)" tabindex="-1">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn-submit" onclick="handleLogin()" data-i18n="signIn">
            <i class="fa-solid fa-right-to-bracket"></i>
            Sign In
        </button>

        <div class="hint" data-i18n="adminHint">admin / admin → <span>admin panel</span></div>
    </div>

    <!-- ── REGISTER ── -->
    <div class="form-panel" id="panel-register">
        <div class="form-title" data-i18n="createAccount">Create account!</div>
        <div class="form-sub" data-i18n="registerPrompt">Fill in the details to register:</div>

        <div class="alert" id="reg-alert">
            <i class="fa-solid fa-circle-info"></i>
            <span id="reg-alert-msg"></span>
        </div>

        <div class="field">
            <label data-i18n="username">Username</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="reg-user" placeholder="choose a username" autocomplete="off" data-i18n-placeholder="placeholderChooseUsername">
            </div>
        </div>

        <div class="field">
            <label data-i18n="password">Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password" data-i18n-placeholder="placeholderPassword">
                <button class="toggle-pw" onclick="togglePw('reg-pass', this)" tabindex="-1">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="field">
            <label data-i18n="confirmPassword">Confirm Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="reg-confirm" placeholder="repeat password" autocomplete="new-password" data-i18n-placeholder="placeholderRepeatPassword">
                <button class="toggle-pw" onclick="togglePw('reg-confirm', this)" tabindex="-1">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn-submit" onclick="handleRegister()" data-i18n="createAccount">
            <i class="fa-solid fa-user-plus"></i>
            Create Account
        </button>
    </div>

</div>

<script>
    async function postJson(url, payload) {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));
        return { response, data };
    }

    // ── Tab switch ───────────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
        document.getElementById('panel-login').classList.toggle('active', tab === 'login');
        document.getElementById('panel-register').classList.toggle('active', tab === 'register');
        hideAlert('login-alert');
        hideAlert('reg-alert');
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'register') {
        switchTab('register');
    } else {
        switchTab('login');
    }

    // ── Alert helpers ────────────────────────────────────────────
    function showAlert(id, msg, type = 'error') {
        const el = document.getElementById(id);
        el.className = 'alert ' + type;
        document.getElementById(id + '-msg').textContent = msg;
    }
    function hideAlert(id) {
        document.getElementById(id).className = 'alert';
    }

    // ── Toggle password visibility ───────────────────────────────
    function togglePw(inputId, btn) {
        const inp = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (!inp || !icon) return;

        if (inp.type === 'password') {
            inp.type = 'text';
            icon.className = 'fa-solid fa-eye-slash';
        } else {
            inp.type = 'password';
            icon.className = 'fa-solid fa-eye';
        }
    }

    // ── LOGIN ────────────────────────────────────────────────────
    async function handleLogin() {
        const username = document.getElementById('login-user').value.trim();
        const password = document.getElementById('login-pass').value;

        if (!username || !password) {
            showAlert('login-alert', 'Please fill in all fields.');
            return;
        }

        const { response, data } = await postJson('/api/auth/login', { username, password });

        if (!response.ok) {
            showAlert('login-alert', data.message || 'Invalid username or password.');
            return;
        }

        sessionStorage.setItem('ftm_currentUser', data.username || username);
        window.location.href = 'inner.html';
    }

    // ── REGISTER ─────────────────────────────────────────────────
    async function handleRegister() {
        const username = document.getElementById('reg-user').value.trim();
        const password = document.getElementById('reg-pass').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (!username || !password || !confirm) {
            showAlert('reg-alert', 'Please fill in all fields.');
            return;
        }
        if (username.length < 3) {
            showAlert('reg-alert', 'Username must be at least 3 characters.');
            return;
        }
        if (password.length < 4) {
            showAlert('reg-alert', 'Password must be at least 4 characters.');
            return;
        }
        if (password !== confirm) {
            showAlert('reg-alert', 'Passwords do not match.');
            return;
        }

        const { response, data } = await postJson('/api/auth/register', { username, password });

        if (!response.ok) {
            showAlert('reg-alert', data.message || 'Registration failed.');
            return;
        }

        showAlert('reg-alert', data.message || 'Account created! You can now sign in.', 'success');
        setTimeout(() => switchTab('login'), 1200);
    }

    // ── Enter key support ────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const loginActive = document.getElementById('panel-login').classList.contains('active');
        if (loginActive) handleLogin(); else handleRegister();
    });
</script>
<script src="SettingsFrontend/settings.js"></script>

</body>
</html>
